# =============================================================================
# Ansible Configuration — IOS XE Atomic NETCONF (Atomic Config Replace)
# =============================================================================
# Configures Ansible for NETCONF-based operations against IOS XE devices.
# Timeouts are tuned for large config pushes.
# =============================================================================

[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
# SSH connection timeout (seconds)
timeout = 60
# Max parallel device connections
forks = 10
# Human-readable YAML output
stdout_callback = yaml
# Per-task timing in output
callbacks_enabled = ansible.posix.profile_tasks
# Limit output width (profile_tasks dash/star separators)
display_width = 100

[persistent_connection]
# NETCONF session establishment timeout
connect_timeout = 60
# Per-RPC timeout (increase for large configs)
command_timeout = 120
