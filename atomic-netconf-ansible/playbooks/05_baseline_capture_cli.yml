---
# =============================================================================
# Playbook: Baseline Capture (CLI) — Pull Running Config as CLI Text
# =============================================================================
#
# Uses the get-modelled-config-clis RPC to pull the running config as
# familiar CLI text (instead of XML/YANG). This is the starting point
# for the CLI-based atomic workflow — users edit CLI text directly.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/05_baseline_capture_cli.yml
#
# Output (per device):
#   configs/baseline/<hostname>/baseline.cfg  — CLI reference (do not edit)
#   configs/desired/<hostname>.cfg            — CLI working copy (edit this)
#   configs/backups/<hostname>/backup_<ts>.cfg — timestamped backup
#
# =============================================================================

- name: "BASELINE CAPTURE (CLI) — Pull running config as CLI text"
  hosts: iosxe
  gather_facts: false

  tasks:

    # ── Create directory structure ──────────────────────────────────
    - name: "DIRS | Create config directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      loop:
        - "{{ config_baseline_dir }}/{{ inventory_hostname }}"
        - "{{ config_desired_dir }}"
        - "{{ config_backup_dir }}/{{ inventory_hostname }}"

    # ── Pull running config as CLI ──────────────────────────────────
    - name: "GET | Pull running config via get-modelled-config-clis"
      ansible.netcommon.netconf_rpc:
        xmlns: "http://cisco.com/ns/yang/Cisco-IOS-XE-cli-rpc"
        rpc: get-modelled-config-clis
        content: |
          <datastore>running</datastore>
      register: running_cli_raw

    - name: "GET | Extract CLI text from response"
      ansible.builtin.set_fact:
        running_cli: >-
          {{ running_cli_raw.stdout
             | regex_replace('<rpc-reply[^>]*>', '')
             | regex_replace('</rpc-reply>', '')
             | regex_replace('<result[^>]*>', '')
             | regex_replace('</result>', '')
             | trim }}

    - name: "GET | Config size"
      ansible.builtin.debug:
        msg: "Retrieved {{ running_cli | length }} characters of CLI config from {{ inventory_hostname }}"

    # ── Save files ──────────────────────────────────────────────────
    - name: "SAVE | Write CLI baseline (reference)"
      ansible.builtin.copy:
        content: "{{ running_cli }}"
        dest: "{{ config_baseline_dir }}/{{ inventory_hostname }}/baseline.cfg"
        mode: "0644"
      delegate_to: localhost

    - name: "SAVE | Write CLI desired config (working copy)"
      ansible.builtin.copy:
        content: "{{ running_cli }}"
        dest: "{{ config_desired_dir }}/{{ inventory_hostname }}.cfg"
        mode: "0644"
      delegate_to: localhost

    - name: "SAVE | Write timestamped CLI backup"
      ansible.builtin.copy:
        content: "{{ running_cli }}"
        dest: "{{ config_backup_dir }}/{{ inventory_hostname }}/backup_{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}.cfg"
        mode: "0644"
      delegate_to: localhost

    # ── Summary ─────────────────────────────────────────────────────
    - name: "SUMMARY | Baseline capture complete"
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════
          ✅ CLI BASELINE CAPTURED — {{ inventory_hostname }}
          ══════════════════════════════════════════════════

          Config size: {{ running_cli | length }} characters

          Files:
            📄 configs/baseline/{{ inventory_hostname }}/baseline.cfg
               └─ CLI reference (do not edit)
            📄 configs/desired/{{ inventory_hostname }}.cfg
               └─ YOUR WORKING COPY — edit this file!
            📄 configs/backups/{{ inventory_hostname }}/
               └─ Timestamped backup

          ⚠️  This is the FULL running config as CLI text.
          atomic will REPLACE the entire config with this file.
            - Keep ALL physical interface entries
            - Edit descriptions, IPs, shutdown state as needed
            - Add/remove Loopback, Tunnel, VLAN interfaces freely

          Next steps:
            1. Edit configs/desired/{{ inventory_hostname }}.cfg

            2. Preview what atomic would change:
               ansible-playbook -i inventory/hosts.yml \
                 playbooks/07_diff_preview_cli.yml

            3. Atomic Config Replace (dry run first):
               ansible-playbook -i inventory/hosts.yml \
                 playbooks/06_atomic_push_cli.yml
          ══════════════════════════════════════════════════
