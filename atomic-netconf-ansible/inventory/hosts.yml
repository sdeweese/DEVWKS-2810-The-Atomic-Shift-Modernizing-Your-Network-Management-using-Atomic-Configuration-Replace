---
# =============================================================================
# Inventory: atomic Lab Pod
# =============================================================================
#
# Every lab pod has the same access switch reachable at 10.1.1.5 from the
# pod's own VM. This inventory is identical across all pods — no per-pod
# customization required.
#
# Device prerequisites (configure via CLI before using this framework):
#
#   conf t
#     netconf-yang
#     netconf-yang feature candidate-datastore
#     yang-interfaces feature atomic-config
#   end
#
# =============================================================================

all:
  children:

    # ── Access layer switches ─────────────────────────────────────────
    access_switches:
      hosts:
        c9300x-lab:
          ansible_host: 10.1.1.5
          ansible_port: 830

    # ── Parent group for all IOS XE devices ───────────────────────────
    iosxe:
      children:
        access_switches:
