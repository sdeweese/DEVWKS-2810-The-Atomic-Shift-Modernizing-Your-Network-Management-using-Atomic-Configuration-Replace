---
# =============================================================================
# Ansible Galaxy Dependencies — IOS XE Atomic Workflow (C9300X)
# =============================================================================
# Install with:  ansible-galaxy collection install -r requirements.yml
#
# Python packages also required (pip install):
#   ncclient   — NETCONF client library (used by ansible.netcommon.netconf)
#   lxml       — XML parsing (ncclient dependency)
#   xmltodict  — XML ↔ dict conversion (used by some netcommon filters)
#   paramiko   — SSH transport for NETCONF
# =============================================================================

collections:
  - name: ansible.netcommon
    version: ">=6.0.0"           # NETCONF connection plugin + netconf_rpc module
  - name: cisco.ios
    version: ">=8.0.0"           # ios_command for CLI operations
  - name: ansible.posix
    version: ">=1.5.0"           # profile_tasks callback (per-task timing)
